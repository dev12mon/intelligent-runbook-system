services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: runbook_user
      POSTGRES_PASSWORD: runbook_password
      POSTGRES_DB: runbook_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runbook_user -d runbook_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./log-ingestion-gateway
    ports:
      - "8080:8080"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  analyzer:
    build: ./ai-analyzer-service
    ports:
      - "8081:8081"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/runbook_db
      - SPRING_DATASOURCE_USERNAME=runbook_user
      - SPRING_DATASOURCE_PASSWORD=runbook_password
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy