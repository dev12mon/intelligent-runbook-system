<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Runbook Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1f1f1f; border-bottom: 2px solid #0d6efd; }
        .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-header { background-color: #2a2a2a; border-bottom: 1px solid #444; font-weight: bold; color: #0d6efd; }
        .runbook-content { background-color: #000; padding: 15px; border-radius: 5px; font-family: monospace; color: #10b981; white-space: pre-wrap; }
        .badge-critical { background-color: #dc3545; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🛡️ Intelligent Runbook System (SRE Dashboard)</span>
            <button class="btn btn-outline-primary btn-sm" onclick="fetchRunbooks()">Refresh Data 🔄</button>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h4 class="mb-4">Recent AI-Generated Resolutions</h4>
                <div id="runbook-container">
                    <div class="text-center mt-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2">Connecting to Analyzer API...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // The URL of our Spring Boot Analyzer Service
        const API_URL = 'https://expert-succotash-69jp5gqxg7vpcr7x7-8081.app.github.dev/api/v1/runbooks';

        async function fetchRunbooks() {
            const container = document.getElementById('runbook-container');
            
            try {
                // Call the Backend API
                const response = await fetch(API_URL);
                const runbooks = await response.json();
                
                // Clear the loading spinner
                container.innerHTML = '';

                if (runbooks.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">No runbooks found in the database yet. Send some logs!</div>';
                    return;
                }

                // Loop through each runbook and create a UI Card
                runbooks.forEach(runbook => {
                    // Format the date
                    const date = new Date(runbook.createdAt).toLocaleString();

                    const cardHtml = `
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span><i class="bi bi-hdd-network"></i> Service: ${runbook.serviceName}</span>
                                <span class="badge badge-critical">Auto-Generated</span>
                            </div>
                            <div class="card-body">
                                <h6 class="text-danger">Triggered by Error:</h6>
                                <p class="text-muted"><i>"${runbook.errorMessage || 'Unknown Error'}"</i></p>
                                
                                <h6 class="mt-3 text-success">Recommended SRE Action Plan:</h6>
                                <div class="runbook-content">${runbook.runbookContent}</div>
                                
                                <div class="mt-3 text-end text-muted" style="font-size: 0.8rem;">
                                    Generated at: ${date}
                                </div>
                            </div>
                        </div>
                    `;
                    // Inject the HTML into the page
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                console.error("Error fetching runbooks:", error);
                container.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Connection Error!</strong> Could not connect to the API at ${API_URL}.<br>
                        Make sure your Docker containers are running and CORS is configured.
                    </div>`;
            }
        }

        // Load data automatically when the page opens
        window.onload = fetchRunbooks;
    </script>
</body>
</html>
